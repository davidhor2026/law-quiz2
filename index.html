<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>법원직 민법 퀴즈</title>
<style>
body{background:#f2f2f2;font-family:Arial;text-align:center;padding:6px;margin:0;}
.box{background:white;width:96%;max-width:900px;margin:auto;padding:32px 16px;border-radius:26px;}
video{width:420px;border-radius:26px;max-width:96%;background:#000;}
button{font-size:28px;padding:18px 26px;margin:10px;border:none;border-radius:18px;background:#2f80ed;color:white;cursor:pointer;width:90%;max-width:430px;}
.red{background:#e74c3c}.gray{background:#777}.green{background:#27ae60}
.question{font-size:34px;margin-top:26px;line-height:1.7;font-weight:bold;word-break:keep-all;}
#speech,#speechBox{background:#fff4cc;padding:18px;border-radius:20px;margin:18px 0;font-weight:bold;font-size:28px;line-height:1.6;}
#number,#score,#categoryText,#sourceText{color:#777;margin-top:12px;font-size:24px;}
#result{margin-top:24px;font-size:38px;font-weight:bold;}
#explanation{margin-top:22px;color:#555;line-height:1.8;font-size:28px;text-align:left;padding:0 10px;}
#quizScreen,#finalScreen,#wrongNoteScreen{display:none;}
.wrongItem{text-align:left;background:#f7f7f7;margin:12px;padding:16px;border-radius:16px;line-height:1.7;font-size:24px;}
h1{font-size:46px;margin-bottom:22px;line-height:1.25;}
h2{font-size:38px;}

.promoText{
    background:#eef7ff;
    border:2px solid #d6eaff;
    border-radius:18px;
    padding:14px 16px;
    margin:-4px 0 14px;
    font-size:24px;
    line-height:1.55;
    color:#234;
    font-weight:bold;
}
.linkBtns{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin:10px 0 20px;
}
.linkBtns a{
    display:inline-block;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    color:white;
    background:#27ae60;
    padding:13px 20px;
    border-radius:999px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.linkBtns a:hover{
    background:#219653;
}

@media (max-width:600px){

    .promoText{font-size:22px;padding:13px 12px;margin:0 0 12px;}
    .linkBtns a{font-size:21px;padding:13px 18px;width:88%;max-width:430px;}
    .box{width:98%;padding:28px 10px;}
    video{width:360px;}
    .question{font-size:36px;}
    button{font-size:30px;padding:18px 22px;}
}
</style>
</head>

<body>
<div class="box">
<h1>법원직 민법 퀴즈</h1>

<div class="promoText">
    조용한 수험생활을 위한 고시원 안내도 함께 확인해 보세요.<br>
    법원직·공무원·경찰·소방·임용 수험생 여러분을 응원합니다.
</div>

<div class="linkBtns">
    <a href="https://naver.me/xv3o4qD1" target="_blank" rel="noopener noreferrer">고시원 위치 보기</a>
</div>


<div id="startScreen">
    <video id="startVideo" autoplay loop playsinline>
        <source src="teacher.mp4" type="video/mp4">
    </video>

    <div id="speech">문제 데이터를 불러오는 중입니다...</div>

    <button class="green" onclick="turnVideoSoundOn()">동영상 음성 켜기</button>
    <button class="gray" onclick="turnVideoSoundOff()">동영상 음성 끄기</button>

    <button onclick="startQuiz('전체')">전체 랜덤</button>
    <button onclick="startQuiz('민법총칙')">민법총칙</button>
    <button onclick="startQuiz('물권법')">물권법</button>
    <button onclick="startQuiz('채권법')">채권법</button>
    <button onclick="startQuiz('가족법')">가족법</button>

    <br>
    <button class="red" onclick="showWrongNote()">오답노트 보기</button>
    <button class="green" onclick="startWrongQuiz()">오답만 다시 풀기</button>
</div>

<div id="quizScreen">
    <video id="teacherVideo" autoplay muted loop playsinline>
        <source id="videoSource" src="teacher.mp4" type="video/mp4">
    </video>

    <div id="speechBox">문제를 풀어보세요.</div>
    <div id="categoryText"></div>
    <div id="sourceText"></div>
    <div id="number"></div>
    <div id="score"></div>

    <div class="question" id="question"></div>

    <button onclick="checkAnswer('O')">O</button>
    <button onclick="checkAnswer('X')">X</button>

    <br>
    <button onclick="nextQuestion()">다음 문제</button>
    <button class="gray" onclick="goHome()">처음으로</button>

    <div id="result"></div>
    <div id="explanation"></div>
</div>

<div id="finalScreen">
    <video id="finalVideo" autoplay muted loop playsinline>
        <source src="correct.mp4" type="video/mp4">
    </video>

    <h2>퀴즈 완료!</h2>
    <div id="finalScore" style="font-size:34px;font-weight:bold;"></div>
    <p id="finalMessage"></p>
    <button onclick="goHome()">처음으로</button>
    <button onclick="restartSameQuiz()">다시 풀기</button>
    <button class="red" onclick="showWrongNote()">오답노트 보기</button>
</div>

<div id="wrongNoteScreen">
    <h2>오답노트</h2>
    <div id="wrongList"></div>
    <button class="green" onclick="startWrongQuiz()">오답만 다시 풀기</button>
    <button class="red" onclick="clearWrongNote()">오답노트 삭제</button>
    <button onclick="goHome()">처음으로</button>
</div>
</div>

<script>
let quizData = [];
let selectedQuiz = [];
let currentQuestion = 0;
let score = 0;
let answered = false;
let quizMode = "일반";
let videoSoundEnabled = true;

window.onload = function(){
    loadCSVAutomatically();
    playStartVideoOnceWithSound();
};

function turnVideoSoundOn(){
    videoSoundEnabled = true;
    alert("동영상 음성이 켜졌습니다.");

    if(document.getElementById("startScreen").style.display !== "none"){
        playStartVideoOnceWithSound();
    }
}

function turnVideoSoundOff(){
    videoSoundEnabled = false;

    const videos = document.querySelectorAll("video");
    videos.forEach(video => {
        video.muted = true;
        video.volume = 0;
    });

    alert("동영상 음성이 꺼졌습니다.");
}

function stopAllVideos(){
    const videos = document.querySelectorAll("video");
    videos.forEach(video => {
        video.pause();
        video.muted = true;
        video.volume = 0;
        video.currentTime = 0;
    });
}

function playStartVideoOnceWithSound(){
    const startVideo = document.getElementById("startVideo");
    if(!startVideo){ return; }

    startVideo.loop = false;
    startVideo.muted = !videoSoundEnabled;
    startVideo.volume = videoSoundEnabled ? 1 : 0;
    startVideo.currentTime = 0;

    startVideo.play().catch(function(e){
        startVideo.muted = true;
        startVideo.volume = 0;
        startVideo.loop = true;
        startVideo.play().catch(function(err){ console.log(err); });
    });

    startVideo.onended = function(){
        startVideo.muted = true;
        startVideo.volume = 0;
        startVideo.loop = true;
        startVideo.currentTime = 0;
        startVideo.play().catch(function(err){ console.log(err); });
    };
}

function playLoopMuted(videoId){
    stopAllVideos();
    const video = document.getElementById(videoId);

    if(video){
        video.loop = true;
        video.muted = true;
        video.volume = 0;
        video.currentTime = 0;
        video.play().catch(function(e){ console.log(e); });
    }
}

function changeTeacherVideo(fileName, soundOnce){
    const video = document.getElementById("teacherVideo");
    const source = document.getElementById("videoSource");

    if(!video || !source){ return; }

    stopAllVideos();

    source.src = fileName;
    video.load();

    if(soundOnce){
        video.loop = false;
        video.muted = !videoSoundEnabled;
        video.volume = videoSoundEnabled ? 1 : 0;
        video.currentTime = 0;

        video.onended = function(){
            source.src = "teacher.mp4";
            video.load();
            video.loop = true;
            video.muted = true;
            video.volume = 0;
            video.currentTime = 0;
            video.play().catch(function(e){ console.log(e); });
        };
    }else{
        video.loop = true;
        video.muted = true;
        video.volume = 0;
        video.currentTime = 0;
        video.onended = null;
    }

    video.play().catch(function(e){ console.log(e); });
}

function loadCSVAutomatically(){
    fetch("questions.csv?time=" + new Date().getTime(), {cache:"no-store"})
    .then(response => {
        if(!response.ok){ throw new Error("questions.csv 파일을 찾을 수 없습니다."); }
        return response.text();
    })
    .then(text => {
        quizData = parseCSV(text);
        document.getElementById("speech").innerHTML =
        "문제 " + quizData.length + "개를 불러왔습니다. 영역을 선택하세요.";
    })
    .catch(error => {
        document.getElementById("speech").innerHTML =
        "문제 파일을 자동으로 불러오지 못했습니다.<br>questions.csv 파일명과 위치를 확인하세요.";
        alert("questions.csv 자동 로딩 실패");
    });
}

function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const data = [];

    for(let i = 1; i < lines.length; i++){
        const line = lines[i].trim();
        if(line === ""){ continue; }

        const row = line.split(",");

        if(row.length >= 5){
            data.push({
                category: row[0].trim(),
                source: row[1].trim(),
                question: row[2].trim(),
                answer: row[3].trim(),
                explanation: row.slice(4).join(",").trim()
            });
        }
    }

    return data;
}

function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

function startQuiz(category){
    if(quizData.length === 0){
        alert("문제 데이터를 아직 불러오지 못했습니다.");
        return;
    }

    quizMode = category;

    if(category === "전체"){
        selectedQuiz = shuffle([...quizData]);
    }else{
        selectedQuiz = shuffle(quizData.filter(q => q.category === category));
    }

    if(selectedQuiz.length === 0){
        alert("해당 카테고리의 문제가 없습니다.");
        return;
    }

    startSelectedQuiz();
}

function startWrongQuiz(){
    const wrongNote = JSON.parse(localStorage.getItem("wrongNote")) || [];

    if(wrongNote.length === 0){
        alert("저장된 오답이 없습니다.");
        return;
    }

    quizMode = "오답노트";
    selectedQuiz = shuffle([...wrongNote]);
    startSelectedQuiz();
}

function startSelectedQuiz(){
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function loadQuestion(){
    let q = selectedQuiz[currentQuestion];

    changeTeacherVideo("teacher.mp4", false);

    document.getElementById("speechBox").innerHTML = "문장을 끝까지 읽고 판단하세요.";
    document.getElementById("categoryText").innerHTML = "분야: " + q.category;
    document.getElementById("sourceText").innerHTML = "검수표시: " + q.source;
    document.getElementById("number").innerHTML =
    "문제 " + (currentQuestion + 1) + " / " + selectedQuiz.length + " (" + quizMode + ")";

    document.getElementById("score").innerHTML =
    "점수: " + score + " / " + selectedQuiz.length;

    document.getElementById("question").innerHTML = q.question;
    document.getElementById("result").innerHTML = "";
    document.getElementById("explanation").innerHTML = "";

    answered = false;
}

function checkAnswer(answer){
    if(answered){ return; }

    answered = true;
    let q = selectedQuiz[currentQuestion];

    if(answer === q.answer){
        score++;
        document.getElementById("result").innerHTML = "정답입니다!";
        changeTeacherVideo("correct.mp4", true);
        document.getElementById("speechBox").innerHTML = "좋습니다. 정답입니다.";

        if(quizMode === "오답노트"){
            removeFromWrongNote(q);
        }

    }else{
        document.getElementById("result").innerHTML = "오답입니다.";
        changeTeacherVideo("wrong.mp4", true);
        document.getElementById("speechBox").innerHTML = "오답입니다. 오답노트에 저장했습니다.";
        saveWrongQuestion(q);
    }

    document.getElementById("score").innerHTML =
    "점수: " + score + " / " + selectedQuiz.length;

    document.getElementById("explanation").innerHTML =
    "정답: " + q.answer + "<br>" + q.explanation;
}

function nextQuestion(){
    if(!answered){
        alert("먼저 O 또는 X를 선택하세요.");
        return;
    }

    if(currentQuestion === selectedQuiz.length - 1){
        showFinalScreen();
        return;
    }

    currentQuestion++;
    loadQuestion();
}

function showFinalScreen(){
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "block";

    playLoopMuted("finalVideo");

    document.getElementById("finalScore").innerHTML =
    "최종 점수: " + score + " / " + selectedQuiz.length;

    let percent = Math.round((score / selectedQuiz.length) * 100);
    let message = "";

    if(percent >= 90){
        message = "매우 좋습니다. 안정적으로 이해하고 있습니다.";
    }else if(percent >= 70){
        message = "좋습니다. 오답노트를 반복하면 더 좋아집니다.";
    }else{
        message = "오답노트 중심으로 다시 반복하는 것이 좋습니다.";
    }

    document.getElementById("finalMessage").innerHTML = message;
}

function restartSameQuiz(){
    selectedQuiz = shuffle([...selectedQuiz]);
    currentQuestion = 0;
    score = 0;
    answered = false;

    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    loadQuestion();
}

function saveWrongQuestion(q){
    let wrongNote = JSON.parse(localStorage.getItem("wrongNote")) || [];
    let exists = wrongNote.some(item => item.question === q.question);

    if(!exists){
        wrongNote.push(q);
        localStorage.setItem("wrongNote", JSON.stringify(wrongNote));
    }
}

function removeFromWrongNote(q){
    let wrongNote = JSON.parse(localStorage.getItem("wrongNote")) || [];
    wrongNote = wrongNote.filter(item => item.question !== q.question);
    localStorage.setItem("wrongNote", JSON.stringify(wrongNote));
}

function showWrongNote(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "block";

    stopAllVideos();

    let wrongNote = JSON.parse(localStorage.getItem("wrongNote")) || [];
    let html = "";

    if(wrongNote.length === 0){
        html = "<p>아직 저장된 오답이 없습니다.</p>";
    }else{
        wrongNote.forEach((q, index) => {
            html += "<div class='wrongItem'>";
            html += "<b>" + (index + 1) + ". [" + q.category + "]</b><br>";
            html += "<span style='color:#777;'>" + q.source + "</span><br>";
            html += q.question + "<br>";
            html += "<b>정답: " + q.answer + "</b><br>";
            html += "<span style='color:#555;'>" + q.explanation + "</span>";
            html += "</div>";
        });
    }

    document.getElementById("wrongList").innerHTML = html;
}

function clearWrongNote(){
    const ok = confirm("오답노트를 모두 삭제할까요?");
    if(ok){
        localStorage.removeItem("wrongNote");
        showWrongNote();
    }
}

function goHome(){
    document.getElementById("startScreen").style.display = "block";
    document.getElementById("quizScreen").style.display = "none";
    document.getElementById("finalScreen").style.display = "none";
    document.getElementById("wrongNoteScreen").style.display = "none";

    playLoopMuted("startVideo");
}
</script>

</body>
</html>
